<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Premiada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f9; }
        .container { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn-pix { padding: 15px 30px; background: #00cba9; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rifa Premiada</h1>
        <p>Valor por cota: R$ 0,40</p>
        <div style="margin: 20px 0;">
            <label>Quantidade de cotas:</label><br>
            <input type="number" id="qtd" value="1" style="padding: 10px; width: 60px; font-size: 18px;">
        </div>
        
        <button class="btn-pix" onclick="copiarChave()">COPIAR CHAVE PIX</button>
        <p id="msg" style="margin-top: 15px; color: green; font-weight: bold;"></p>
    </div>

    <script>
        function copiarChave() {
            // Sua chave inserida com sucesso
            const minhaChavePix = "0a92fdf1-bdf7-466d-9d17-298d50f26f04"; 
            
            navigator.clipboard.writeText(minhaChavePix);
            document.getElementById('msg').innerText = "Chave copiada! Cole no seu banco e faça o Pix.";
            alert("Chave Pix copiada: " + minhaChavePix + "\n\nAgora cole no seu aplicativo bancário.");
        }
    </script>
</body>
</html>
