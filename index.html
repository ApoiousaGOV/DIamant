<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Premiada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: #ffffff; width: 100%; max-width: 480px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .titulo { font-size: 24px; color: #1a202c; margin: 15px 0; }
        .preco { font-size: 18px; color: #4a5568; margin-bottom: 20px; }
        .caixa-qtd { margin: 20px 0; }
        input { width: 80px; padding: 10px; font-size: 18px; text-align: center; border: 2px solid #e2e8f0; border-radius: 8px; }
        .btn-pix { width: 100%; padding: 18px; background: #00cba9; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #msg { margin-top: 15px; color: #059669; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="titulo">Rifa Premiada</h1>
    <p class="preco">Valor por cota: <strong>R$ 0,40</strong></p>

    <div class="caixa-qtd">
        <label>Quantidade de cotas:</label><br>
        <input type="number" id="qtd" value="1" min="1">
    </div>

    <button class="btn-pix" onclick="copiarChave()">COPIAR CHAVE PIX</button>
    <p id="msg"></p>
    
    <p style="margin-top: 20px; font-size: 12px; color: #718096;">
        Após copiar, abra seu banco e escolha "Pix Copia e Cola".
    </p>
</div>

<script>
    function copiarChave() {
        const minhaChavePix = "0a92fdf1-bdf7-466d-9d17-298d50f26f04"; 
        navigator.clipboard.writeText(minhaChavePix);
        
        document.getElementById('msg').innerText = "Chave copiada com sucesso!";
        alert("Chave Pix copiada! Cole no seu banco.");
    }
</script>

</body>
</html>
