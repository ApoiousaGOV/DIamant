<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrente do Bem</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: #ffffff; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn-pix { background: #059669; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 20px 0; }
        .galeria img { width: 100%; border-radius: 12px; margin-bottom: 10px; display: block; }
        .email-pix { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; padding: 10px; background: #eee; border-radius: 8px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Corrente do Bem ❤️</h1>
    <p>Sua solidariedade tem o poder de transformar vidas.</p>
    
    <p>Chave Pix (E-mail):</p>
    <div class="email-pix">deividkratos000@gmail.com</div>
    
    <button class="btn-pix" onclick="copiar()">COPIAR E-MAIL DO PIX</button>
    <p id="aviso"></p>

    <div class="galeria">
        <img src="063d0c70-1bea-44ef-82c8-7f0d3125b743.jpeg" alt="Foto">
        <img src="1000138414.jpg" alt="Foto">
        <img src="1000138419.png" alt="Foto">
        <img src="3f402980-15ba-48ca-b30b-e0ffb50228e1.jpeg" alt="Foto">
        <img src="6e6cb1cb-c5fa-4383-8d4a-943352cd2aec.jpeg" alt="Foto">
        <img src="a5b38671-c216-4391-8e1d-3e3737136955.jpeg" alt="Foto">
        <img src="d740c41d-9884-4c00-a53e-09fe6bdf34cc.jpeg" alt="Foto">
    </div>
</div>
<script>
    function copiar() {
        const email = 'deividkratos000@gmail.com';
        navigator.clipboard.writeText(email).then(() => {
            document.getElementById('aviso').innerText = "E-mail copiado! Cole no Pix do seu banco.";
        });
    }
</script>
</body>
</html>
